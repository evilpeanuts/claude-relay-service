# Workflow 的名称，会显示在 GitHub Actions 页面
name: 🔄 Sync Upstream (Rebase Clean)

# 定义何时触发这个 workflow
on:
  schedule:
    # 每天 UTC 2:00 运行 = 北京时间次日 10:00
    - cron: "0 2 * * *"
  
  # 允许在 GitHub Actions 页面手动点击按钮触发
  workflow_dispatch:

# 权限设置：给予这个 workflow 写入仓库内容的权限
#permissions:
#  contents: write  # 允许推送代码到仓库

# 定义要执行的任务
jobs:
  # 任务名称为 "sync"
  sync:
    # 指定运行环境：使用最新版本的 Ubuntu Linux
    runs-on: ubuntu-latest

    # 定义这个任务的执行步骤
    steps:
      # ========== 步骤 1：检出你的仓库代码 ==========
      - name: 🧩 Checkout your repository
        # 使用 GitHub 官方提供的 checkout action
        uses: actions/checkout@v4
        with:
          # 使用 ${{ secrets.GITHUB_TOKEN }} 进行认证， 如果权限不足 使用 ${{ secrets.SYNC_TOKEN }} 同时删除 permissions: contents: write 
          token: ${{ secrets.SYNC_TOKEN }}
          
          # 获取完整的 Git 历史记录
          fetch-depth: 0

      # ========== 步骤 2：配置 Git 用户信息 ==========
      - name: 🧱 Configure Git
        run: |
          # 设置 Git 提交时使用的用户名
          git config user.name "github-actions[bot]"
          
          # 设置 Git 提交时使用的邮箱
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ========== 步骤 3：添加上游仓库并获取最新代码 ==========
      - name: 🔗 Add upstream remote
        run: |
          # 添加上游仓库（使用 HTTPS 地址，而不是 SSH）
          git remote add upstream https://github.com/Wei-Shaw/claude-relay-service.git
          
          # 从上游仓库获取所有分支和提交记录
          git fetch upstream

      # ========== 步骤 4：使用 rebase 方式同步主分支 ==========
      - name: 🔄 Rebase main with upstream/main
        run: |
          # 切换到 main 分支
          git checkout main
          
          # 输出提示信息
          echo "Fetching and rebasing from upstream/main..."
          
          # 执行 rebase 操作
          # 时自动把冲突文件全部用 theirs 并继续（不中断 workflow）
          git rebase upstream/main  -X theirs || (
            echo "⚠️ Rebase conflict, aborting."
            git rebase --abort
            exit 0
          )

      # ========== 步骤 5：强制推送更新后的 main 分支 ==========
      - name: 🚀 Push rebased main back to origin
        run: |
          # 推送 main 分支到远程仓库
          # --force-with-lease：安全的强制推送
          git push origin main --force-with-lease

      # ========== 步骤 5.5：同步最新的 50 条 tags ==========
      - name: 🏷️ Sync latest 50 tags from upstream
        if: ${{ success() }}
        run: |
          echo "Syncing latest 50 tags from upstream..."

          TAG_COUNT=50
          ORIGIN=origin

          # 退出时自动清理临时文件
          cleanup() {
            rm -f upstream_tags_all.txt upstream_latest_tags.txt origin_tags_raw.txt origin_tags.txt
          }
          trap cleanup EXIT

          # --- 1. 从上游获取所有 tags ---
          git fetch upstream --tags

          # --- 2. 取最新的 $TAG_COUNT 条 tags（按创建时间倒序）---
          git tag -l --sort=-creatordate > upstream_tags_all.txt
          head -n "$TAG_COUNT" upstream_tags_all.txt > upstream_latest_tags.txt

          if [ ! -s upstream_latest_tags.txt ]; then
            echo "ℹ️ No tags found in upstream repository"
            exit 0
          fi

          tag_count=$(wc -l < upstream_latest_tags.txt)
          echo "📌 Found $tag_count tags to sync"

          # --- 3. 本地缺失的 tag 从 upstream 补全 ---
          echo "--- Fetching missing tags locally ---"
          while IFS= read -r tag; do
            if git show-ref --tags --quiet "refs/tags/$tag"; then
              echo "  Skip existing local tag: $tag"
            else
              echo "  Fetch missing tag: $tag"
              git fetch upstream "refs/tags/$tag:refs/tags/$tag"
            fi
          done < upstream_latest_tags.txt

          # --- 4. 获取 origin 当前已有的 tags ---
          echo "--- Getting origin tags ---"
          git ls-remote --tags "$ORIGIN" > origin_tags_raw.txt
          awk -F'/' '{print $NF}' origin_tags_raw.txt | grep -v '\^{}' > origin_tags.txt

          # --- 5. 推送 origin 缺少的 tag（按需推送，不强制覆盖）---
          echo "--- Pushing missing tags to origin ---"
          while IFS= read -r tag; do
            if grep -qxF "$tag" origin_tags.txt; then
              echo "  Tag already exists on origin: $tag"
            else
              echo "  Pushing tag: $tag"
              git push "$ORIGIN" "refs/tags/$tag" || echo "  ⚠️ Failed to push tag: $tag"
            fi
          done < upstream_latest_tags.txt

          # --- 6. 删除 origin 上不在最新 $TAG_COUNT 条中的旧 tag ---
          echo "--- Deleting old tags from origin ---"
          while IFS= read -r tag; do
            if grep -qxF "$tag" upstream_latest_tags.txt; then
              : # 在最新列表中，跳过
            else
              echo "  Delete old tag from origin: $tag"
              git push "$ORIGIN" ":refs/tags/$tag" || echo "  ⚠️ Failed to delete tag: $tag"
            fi
          done < origin_tags.txt

          echo "✅ Tags sync completed"

      # ========== 步骤 6：更新你的 CustomProduction 开发分支 ==========
      - name: 🧬 Update CustomProduction branch from main
        # 只有当前面所有步骤都成功时才执行
        if: ${{ success() }}
        run: |
          # 尝试从远程获取 CustomProduction 分支
          # 如果不存在则创建它
          git fetch origin CustomProduction || git branch CustomProduction
          
          # 切换到 CustomProduction 分支
          git checkout CustomProduction
          
          # 将 CustomProduction 分支 rebase 到最新的 main 分支上
          # 这样你的自定义功能会建立在最新的上游代码之上
          git rebase upstream/main -X theirs || (
            echo "⚠️ Conflict detected on CustomProduction, skipping."
            git rebase --abort
            exit 0
          )
          
          # 推送更新后的 CustomProduction 分支
          git push origin CustomProduction --force-with-lease

      # ========== 步骤 7：输出同步摘要 ==========
      - name: 📊 Sync summary
        if: ${{ success() }}
        run: |
          echo "✅ Successfully synced with upstream repository"
          echo "📊 Latest commits from upstream:"
          git log --oneline -5 upstream/main